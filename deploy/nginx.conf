# Bruno Collective — Nginx site config
#
# Routing:
#   /          -> Next.js storefront (Node, 127.0.0.1:3000)
#   /admin     -> Vue admin SPA (static files in /opt/inventory/frontend/dist)
#   /api       -> Go backend (127.0.0.1:8080)
#   /uploads   -> Go backend (127.0.0.1:8080)  [uploaded payment slips]
#
# Place at /etc/nginx/sites-available/bruno and symlink into sites-enabled.
# SSL is terminated at Cloudflare (Full Strict + Origin Certificate); this
# origin block listens on 443 with the Origin cert.

server {
    listen 80;
    server_name brunocollective.example www.brunocollective.example;
    # Let Cloudflare handle the redirect, or force HTTPS here if desired.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name brunocollective.example www.brunocollective.example;

    # --- Cloudflare Origin Certificate ---
    ssl_certificate     /etc/ssl/cloudflare/bruno-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/bruno-origin.key;

    # 10MB to match the backend body limit (payment slip uploads).
    client_max_body_size 10M;

    # ---- Go backend: API ----
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Go backend: uploaded slips ----
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Vue admin SPA under /admin ----
    # Built with Vite base=/admin/, so asset URLs are /admin/assets/*.
    # `alias` strips the /admin/ prefix; the named-location fallback serves
    # index.html for client-side routes (deep links like /admin/orders).
    location /admin/ {
        alias /opt/inventory/frontend/dist/;
        try_files $uri $uri/ @admin_fallback;
    }
    location @admin_fallback {
        rewrite ^ /admin/index.html last;
    }
    # Redirect bare /admin to /admin/ so the SPA base resolves.
    location = /admin {
        return 301 /admin/;
    }

    # ---- Next.js storefront at root ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
